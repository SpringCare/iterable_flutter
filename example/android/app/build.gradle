plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

// AGP 9 applies Kotlin itself; applying KGP as well is rejected outright.
// See https://docs.flutter.dev/release/breaking-changes/migrate-to-built-in-kotlin
def agpMajor = com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION.tokenize('.')[0] as int
if (agpMajor < 9) {
    apply plugin: 'kotlin-android'

    // Without this, KGP defaults the Kotlin jvmTarget to the JDK in use (21) while
    // Java compiles at 17, and Gradle fails on the mismatch. AGP 9's built-in Kotlin
    // takes the target from `android.compileOptions` instead, so this is legacy-only.
    kotlin {
        compilerOptions {
            jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
        }
    }
}

android {
    namespace = "com.lahaus.iterable_flutter_example"
    compileSdk = 34

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }


    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId = "com.lahaus.iterable_flutter_example"
        minSdk = flutter.minSdkVersion
        targetSdk = 34
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation 'com.google.firebase:firebase-messaging:22.0.0'
}
