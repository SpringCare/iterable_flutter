name: iterable_flutter
description: Flutter implementation for iterable.com Cross Channel Marketing Platform
version: 0.8.1
# This fork is consumed as a git dependency and is deliberately NOT published to
# pub.dev — the `iterable_flutter` name there belongs to the upstream la-haus
# project. `publish_to: none` makes an accidental publication impossible.
publish_to: none
homepage: https://lahaus.com
repository: https://github.com/SpringCare/iterable_flutter
issue_tracker: https://github.com/SpringCare/iterable_flutter/issues
documentation: https://github.com/SpringCare/iterable_flutter#readme

environment:
  sdk: ^3.0.0
  flutter: ">=1.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  lint: 1.6.0

flutter:
  # This section identifies this Flutter project as a plugin project.
  # The 'pluginClass' and Android 'package' identifiers should not ordinarily
  # be modified. They are used by the tooling to maintain consistency when
  # adding or updating assets for this project.
  plugin:
    platforms:
      android:
        package: com.lahaus.iterable_flutter
        pluginClass: IterableFlutterPlugin
      ios:
        pluginClass: IterableFlutterPlugin
